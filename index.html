    <style>
      body {
        margin: 0;
        background-color: rgb(36, 36, 41);
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .rounded-img {
        width: min(50%, 320px);
        border-radius: 10%;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
        padding: 0.4em;
        margin-bottom: 1rem;
      }

      .hero-wrap {
        padding: 2rem 1rem 3rem;
      }

      .hero-card {
        max-width: 720px;
        margin: 0 auto;
        text-align: center;
      }

      .hero-card h1 {
        margin-top: 1rem;
        margin-bottom: 1rem;
      }

      .hero-text {
        color: #d7d7d7;
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }

      .contact-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }

      .contact-buttons .btn {
        min-width: 120px;
      }

      @media (max-width: 576px) {
        .hero-wrap {
          padding: 1.25rem 0.75rem 2rem;
        }

        .rounded-img {
          width: min(70%, 180px);
        }

        .hero-card h1 {
          font-size: 2rem;
        }

        .hero-text {
          font-size: 0.98rem;
        }

        .contact-buttons {
          flex-direction: column;
        }

        .contact-buttons .btn {
          width: 100%;
        }
      }
    </style>
  </head>
